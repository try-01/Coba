name: Build Android APK

# Kapan proses build akan berjalan?
on:
  push:
    branches: [ "main", "master" ] # Berjalan otomatis setiap ada kode baru yang di-push ke main/master
  workflow_dispatch: # Menambahkan tombol manual agar Anda bisa mem-build kapan saja

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest # Server cloud menggunakan Ubuntu

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17 (OpenJDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Menyimpan cache agar build berikutnya jauh lebih cepat

      - name: 🔑 Beri Izin Eksekusi Gradle
        run: chmod +x gradlew

      - name: 🔨 Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 🚀 Upload APK sebagai Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Remote-Samsung-App
          # Lokasi standar hasil build APK di Android Studio/Gradle
          path: app/build/outputs/apk/debug/app-debug.apk 
