name: Android APK Compiler (Android 9 - 16)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compile Production APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # Menggunakan perintah assembleRelease sesuai rekomendasi AI OpenCode Anda
    - name: Build Release APK with Gradle
      run: ./gradlew assembleRelease

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Samsung-TV-Remote-Release-APK
        # Path default tempat Gradle menyimpan hasil build APK rilis yang belum ditandatangani (unsigned)
        path: app/build/outputs/apk/release/*-unsigned.apk
        
