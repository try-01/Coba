name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔑 Beri Izin Eksekusi Skrip
        run: |
          cd SamsungTvRemote
          chmod +x build.sh
          ./build.sh assembleDebug --no-daemon

      - name: 🚀 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Remote-Samsung-App
          path: SamsungTvRemote/app/build/outputs/apk/debug/app-debug.apk
