name: Android APK Compiler (Android 9 - 16)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compile Production APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # PERBAIKAN: Mengubah versi generator gradle wrapper ke versi 8.9 atau lebih tinggi
    - name: Setup Gradle Wrapper if missing
      run: cd RemoteTv && |
        if [ ! -f gradlew ]; then
          echo "Gradlew missing. Initializing dynamic wrapper..."
          gradle wrapper --gradle-version 8.9
        else
          echo "Updating Gradle wrapper to 8.9..."
          ./gradlew wrapper --gradle-version 8.9
        fi

    - name: Grant Execute RemoteTv for Gradlew
      run: chmod +x gradlew

    - name: Build Release APK with Gradle
      run: ./gradlew assembleRelease

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Samsung-TV-Remote-Release-APK
        path: app/build/outputs/apk/release/*-unsigned.apk
        
