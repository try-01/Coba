name: Android APK Compiler (Android 9 - 16)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compile Production APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # KUNCI PERBAIKAN: Generate Gradle Wrapper otomatis di server GitHub jika file tidak ada
    - name: Setup Gradle Wrapper if missing
      run: |
        if [ ! -f gradlew ]; then
          echo "Gradlew missing. Initializing dynamic wrapper..."
          gradle wrapper --gradle-version 8.5
        fi

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Release APK with Gradle
      run: ./gradlew assembleRelease

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Samsung-TV-Remote-Release-APK
        path: app/build/outputs/apk/release/*-unsigned.apk
        
