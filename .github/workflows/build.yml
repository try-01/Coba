name: Build Android TV Remote

# Hanya akan berjalan jika Anda menekan tombol "Run workflow" di GitHub
on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          cd AndroidTvRemote
          chmod +x build.sh
          ./build.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AndroidTvRemote-APK
          path: AndroidTvRemote/app/build/outputs/apk/debug/*.apk
